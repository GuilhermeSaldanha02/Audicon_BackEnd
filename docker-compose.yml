services:
  db:
    image: postgres:16-alpine
    container_name: audicon_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: development
    container_name: audicon_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DB_HOST=db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:3000/api/v1/health/live || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - path: Dockerfile
          action: rebuild
        - path: package.json
          action: rebuild
        - path: package-lock.json
          action: rebuild

volumes:
  postgres_data:
